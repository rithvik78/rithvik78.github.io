<!DOCTYPE html>
<html class="no-js" lang="">

<head>
    <!-- meta charset -->
    <meta charset="utf-8">
    <!-- site title -->
    <title>Rithvik | Contact</title>
    <!-- meta description -->
    <meta name="description" content="">
    <!-- mobile viwport meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- fevicon -->
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

    <!-- ================================
        CSS Files
        ================================= -->
    <link href="https://fonts.googleapis.com/css?family=Libre+Baskerville:400,400i|Open+Sans:400,600,700,800"
        rel="stylesheet">
    <link rel="stylesheet" href="css/themefisher-fonts.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link id="color-changer" rel="stylesheet" href="css/colors/color-0.css">
</head>

<body>

    <div class="preloader">
        <div class="loading-mask"></div>
        <div class="loading-mask"></div>
        <div class="loading-mask"></div>
        <div class="loading-mask"></div>
        <div class="loading-mask"></div>
    </div>

    <div class="preview-wrapper">
        <div class="switcher-head">
            <span>Switch Theme</span>
            <div class="switcher-trigger tf-tools"></div>
        </div>

        <div class="switcher-body">
            <h4>Choose Color:</h4>
            <ul class="color-options list-none">
                <li class="c0" data-color="red" title="Default">Default</li>
                <li class="c1" data-color="blue" title="Red">Red</li>
                <li class="c2" data-color="green" title="Green">Green</li>
                <li class="c3" data-color="yellow" title="Blue">Blue</li>
            </ul>
        </div>
    </div>

    <main class="site-wrapper">
        <div class="pt-table">
            <div class="pt-tablecell page-contact relative">
                <!-- .close -->
                <a href="./" class="page-close"><i class="tf-ion-close"></i></a>
                <!-- /.close -->

                <div class="container">
                    <div class="row">
                        <div class="col-xs-12 col-md-offset-1 col-md-10 col-lg-offset-2 col-lg-8">
                            <div class="page-title text-center">
                                <h2>Feed <span class="primary">Back</span> <span class="title-bg">Contact</span></h2>

                            </div>
                        </div>
                    </div> <!-- /.row -->
                    <div class="col-xs-12 col-sm-7 col-md-7 col-md-offset-1 col-lg-offset-2">
                        <div class="section-title clear">
                            <h3>Send me a meesage</h3>
                            <span class="bar-dark"></span>
                            <span class="bar-primary"></span>
                        </div>
                        <form action="https://formspree.io/f/mpzbzwln" method="POST">
                            <div class="col-xs-12 col-sm-12">
                                <div class="input-field email">
                                    <label>
                                        Email: <br>
                                        <input type="email" name="_replyto" placeholder="Your email address">
                                    </label>
                                </div>
                            </div>
                            <br>
                            <div class="col-xs-12 col-sm-12">
                                <div class="input-field message">
                                    <label>
                                        Message: <br>
                                        <textarea name="message" placeholder="Write your message"></textarea>
                                    </label>
                                </div>
                            </div>
                            <br>
                            <!-- your other form fields go here -->
                            <button type="submit" class="btn btn-primary btn-custom-border text-uppercase">Send</button>
                        </form>

                    </div> <!-- /.col- -->
                </div> <!-- /.row -->
            </div> <!-- /.container -->

            <nav class="page-nav clear">
                <div class="container">
                    <div class="flex flex-middle space-between">
                        <span class="prev-page"><a href="works.html" class="link">&larr; Prev Page</a></span>

                    </div>
                </div>
                <!-- /.page-nav -->
            </nav>
            <!-- /.container -->

        </div> <!-- /.pt-tablecell -->
        </div> <!-- /.pt-table -->
    </main> <!-- /.site-wrapper -->

    <!-- ================================
        JavaScript Libraries
        ================================= -->
    <script src="js/vendor/jquery-2.2.4.min.js"></script>
    <script src="js/vendor/bootstrap.min.js"></script>
    <script src="js/jquery.easing.min.js"></script>
    <script src="js/isotope.pkgd.min.js"></script>
    <script src="js/jquery.nicescroll.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery-validation.min.js"></script>
    <script src="js/form.min.js"></script>
    <script src="js/main.js"></script>
</body>
<script>
    document.addEventListener('keydown', function () {
        if (event.keyCode == 123) {
            alert("This function has been disabled");
            return false;
        } else if (event.ctrlKey && event.shiftKey && event.keyCode == 73) {
            alert("This function has been disabled");
            return false;
        } else if (event.ctrlKey && event.keyCode == 85) {
            alert("This function has been disabled");
            return false;
        }
    }, false);

    if (document.addEventListener) {
        document.addEventListener('contextmenu', function (e) {
            alert("This function has been disabled");
            e.preventDefault();
        }, false);
    } else {
        document.attachEvent('oncontextmenu', function () {
            alert("This function has been disabled");
            window.event.returnValue = false;
        });

    }
</script>

</html>
